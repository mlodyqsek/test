<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kochasz mnie?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070303;
    --bg-1:#150807;
    --rose:#c2261c;
    --rose-bright:#e8412c;
    --gold:#c9a35a;
    --cream:#f3ead9;
    --muted:#9a8c78;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:var(--bg-0);
    overflow:hidden;
  }

  body{
    font-family:'Jost', sans-serif;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100svh;
  }

  .stage{
    position:relative;
    width:100%;
    max-width:430px;
    height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    background:
      radial-gradient(ellipse 90% 50% at 50% 28%, rgba(120,22,18,0.35), transparent 70%),
      radial-gradient(ellipse 140% 90% at 50% 100%, var(--bg-1), var(--bg-0) 60%);
    overflow:hidden;
    padding:0 0 env(safe-area-inset-bottom, 0);
  }

  /* ambient floating embers */
  .embers span{
    position:absolute;
    bottom:-10px;
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--gold);
    opacity:0.55;
    filter:blur(0.5px);
    animation:float 9s linear infinite;
  }
  @keyframes float{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.6; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,10px)); opacity:0; }
  }

  .rose-wrap{
    margin-top:9vh;
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 0 38px rgba(196,40,28,0.45)) drop-shadow(0 0 80px rgba(196,40,28,0.18));
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.035); }
  }
  .rose-wrap svg{ width:58vw; max-width:230px; height:auto; }

  .eyebrow{
    margin-top:5vh;
    font-family:'Jost', sans-serif;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.85;
  }

  .question{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:13vw;
    line-height:1.05;
    margin:14px 0 0 0;
    text-align:center;
    color:var(--cream);
    letter-spacing:0.01em;
  }
  .question b{
    font-style:normal;
    font-weight:600;
    color:var(--rose-bright);
  }

  .sub{
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.02em;
    text-align:center;
    padding:0 18%;
  }

  .answer-zone{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .buttons{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    position:relative;
  }

  button{
    font-family:'Jost', sans-serif;
    border:none;
    cursor:pointer;
    border-radius:999px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease, padding .35s ease, font-size .35s ease, box-shadow .3s ease;
    -webkit-user-select:none;
    user-select:none;
  }

  #tak{
    background:linear-gradient(135deg, var(--rose-bright), var(--rose) 70%);
    color:#fff7f0;
    font-weight:600;
    font-size:15px;
    padding:16px 38px;
    box-shadow:0 10px 30px rgba(196,40,28,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    transform:scale(1);
  }
  #tak:active{ transform:scale(0.96); }

  #nie{
    background:transparent;
    color:var(--muted);
    font-weight:500;
    font-size:14px;
    padding:15px 30px;
    border:1px solid rgba(154,140,120,0.4);
    transform:scale(1);
  }
  #nie.hidden{
    opacity:0;
    transform:scale(0.2);
    pointer-events:none;
    width:0;
    padding:0;
    margin:0;
  }

  .footer-space{
    height:7vh;
  }

  /* ---- Reveal screen ---- */
  .reveal{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 12%;
    opacity:0;
    pointer-events:none;
    transition:opacity .7s ease;
  }
  .reveal.show{
    opacity:1;
    pointer-events:auto;
  }
  .reveal .heart{
    font-size:48px;
    animation:pulse 1.4s ease-in-out infinite;
    filter:drop-shadow(0 0 22px rgba(232,65,44,0.6));
    margin-bottom:18px;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.15); }
  }
  .reveal p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size:11vw;
    line-height:1.15;
    color:var(--cream);
    margin:0;
  }
  .reveal p span{
    color:var(--rose-bright);
    font-style:normal;
  }

  .main-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    transition:opacity .5s ease;
  }
  .main-content.fade-out{
    opacity:0;
    pointer-events:none;
  }

  @media (min-width:430px){
    .question{ font-size:48px; }
    .reveal p{ font-size:38px; }
  }
</style>
</head>
<body>

<div class="stage">

  <div class="embers" id="embers"></div>

  <div class="main-content" id="mainContent">
    <div class="rose-wrap">
      <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="petal" cx="40%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#ff5b42"/>
            <stop offset="55%" stop-color="#d22a1c"/>
            <stop offset="100%" stop-color="#7c0f0a"/>
          </radialGradient>
          <linearGradient id="stem" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5c7a4a"/>
            <stop offset="100%" stop-color="#33421f"/>
          </linearGradient>
        </defs>
        <!-- stem -->
        <path d="M100 140 C 95 190, 90 230, 95 290" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- leaves -->
        <path d="M97 200 C 70 195, 50 210, 40 235 C 65 235, 85 222, 97 200 Z" fill="#3f5a2c"/>
        <path d="M96 240 C 122 238, 142 252, 150 275 C 124 277, 104 263, 96 240 Z" fill="#48652f"/>
        <!-- bloom -->
        <g>
          <path d="M100 60 C 60 65, 50 105, 75 135 C 55 120, 50 90, 75 65 C 60 95, 70 125, 100 140 C 70 130, 55 100, 80 70 Z" fill="url(#petal)"/>
          <path d="M100 50 C 140 55, 152 95, 128 128 C 148 112, 152 82, 128 58 C 144 86, 134 116, 100 130 C 132 118, 146 90, 122 62 Z" fill="url(#petal)"/>
          <path d="M100 45 C 80 40, 60 55, 60 80 C 60 105, 80 122, 100 125 C 82 118, 70 100, 72 80 C 74 60, 88 48, 100 45 Z" fill="#e84a32"/>
          <path d="M100 45 C 120 40, 140 55, 140 80 C 140 105, 120 122, 100 125 C 118 118, 130 100, 128 80 C 126 60, 112 48, 100 45 Z" fill="#c92a1c"/>
          <path d="M100 55 C 88 60, 82 75, 86 90 C 90 105, 100 112, 100 112 C 92 102, 88 88, 92 75 C 95 65, 100 58, 100 55 Z" fill="#960f0c"/>
        </g>
      </svg>
    </div>

    <div class="eyebrow">jedno pytanie</div>
    <h1 class="question">kochasz <b>mnie?</b></h1>
    <p class="sub">odpowiedz szczerze...</p>

    <div class="answer-zone">
      <div class="buttons">
        <button id="tak" onclick="sayYes()">TAK</button>
        <button id="nie" onclick="sayNo()">NIE</button>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <div class="reveal" id="reveal">
    <div class="heart">❤️</div>
    <p>ja ciebie też, <span>Ewelina</span></p>
  </div>

</div>

<script>
  let noClicks = 0;

  function sayNo(){
    noClicks++;
    const nieBtn = document.getElementById('nie');
    const takBtn = document.getElementById('tak');

    const nieScale = Math.max(0.35, 1 - noClicks * 0.3);
    const takScale = 1 + noClicks * 0.35;

    nieBtn.style.transform = `scale(${nieScale})`;
    takBtn.style.transform = `scale(${takScale})`;

    if(noClicks >= 2){
      nieBtn.classList.add('hidden');
    }
  }

  function sayYes(){
    document.getElementById('mainContent').classList.add('fade-out');
    document.getElementById('reveal').classList.add('show');
  }

  // gentle floating embers
  const emberLayer = document.getElementById('embers');
  for(let i=0;i<14;i++){
    const e = document.createElement('span');
    e.style.left = (Math.random()*100) + '%';
    e.style.setProperty('--drift', (Math.random()*40-20) + 'px');
    e.style.animationDelay = (Math.random()*9) + 's';
    e.style.animationDuration = (7 + Math.random()*5) + 's';
    emberLayer.appendChild(e);
  }
</script>

</body>
</html>
