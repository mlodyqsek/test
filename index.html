<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kochasz mnie?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070303;
    --bg-1:#150807;
    --rose:#c2261c;
    --rose-bright:#e8412c;
    --gold:#c9a35a;
    --cream:#f3ead9;
    --muted:#9a8c78;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:var(--bg-0);
    overflow:hidden;
  }

  body{
    font-family:'Jost', sans-serif;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100svh;
  }

  .stage{
    position:relative;
    width:100%;
    max-width:430px;
    height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    background:
      radial-gradient(ellipse 90% 50% at 50% 28%, rgba(120,22,18,0.35), transparent 70%),
      radial-gradient(ellipse 140% 90% at 50% 100%, var(--bg-1), var(--bg-0) 60%);
    overflow:hidden;
    padding:0 0 env(safe-area-inset-bottom, 0);
  }

  /* ambient floating embers */
  .embers span{
    position:absolute;
    bottom:-10px;
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--gold);
    opacity:0.55;
    filter:blur(0.5px);
    animation:float 9s linear infinite;
  }
  @keyframes float{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.6; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,10px)); opacity:0; }
  }

  .rose-wrap{
    margin-top:9vh;
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 0 38px rgba(196,40,28,0.45)) drop-shadow(0 0 70px rgba(196,40,28,0.18));
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.035); }
  }
  .rose-wrap .rose-emoji{
    font-size:78px;
    line-height:1;
  }

  .eyebrow{
    margin-top:5vh;
    font-family:'Jost', sans-serif;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.85;
  }

  .question{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:9.5vw;
    line-height:1.12;
    margin:14px 0 0 0;
    text-align:center;
    color:var(--cream);
    letter-spacing:0.01em;
  }
  .question b{
    font-style:normal;
    font-weight:600;
    color:var(--rose-bright);
  }

  .sub{
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.02em;
    text-align:center;
    padding:0 18%;
  }

  .answer-zone{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .buttons{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    position:relative;
  }

  button{
    font-family:'Jost', sans-serif;
    border:none;
    cursor:pointer;
    border-radius:999px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease, padding .35s ease, font-size .35s ease, box-shadow .3s ease;
    -webkit-user-select:none;
    user-select:none;
  }

  #tak{
    background:linear-gradient(135deg, var(--rose-bright), var(--rose) 70%);
    color:#fff7f0;
    font-weight:600;
    font-size:15px;
    padding:16px 38px;
    box-shadow:0 10px 30px rgba(196,40,28,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    transform:scale(1);
  }
  #tak:active{ transform:scale(0.96); }

  #nie{
    background:transparent;
    color:var(--muted);
    font-weight:500;
    font-size:14px;
    padding:15px 30px;
    border:1px solid rgba(154,140,120,0.4);
    transform:scale(1);
    white-space:nowrap;
  }
  #nie.roaming{
    position:fixed;
    top:50%;
    left:50%;
    z-index:20;
    transition:top .45s cubic-bezier(.34,1.56,.64,1), left .45s cubic-bezier(.34,1.56,.64,1), transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease, font-size .35s ease, padding .35s ease;
  }
  #nie.hidden{
    opacity:0;
    transform:scale(0.2) !important;
    pointer-events:none;
    width:0;
    padding:0;
    margin:0;
  }

  .footer-space{
    height:7vh;
  }

  .sound-control{
    position:fixed;
    top:max(16px, env(safe-area-inset-top));
    right:16px;
    z-index:30;
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(10,5,5,0.55);
    backdrop-filter:blur(6px);
    border:1px solid rgba(154,140,120,0.35);
    border-radius:999px;
    padding:0;
    height:38px;
    overflow:hidden;
    transition:padding .35s ease;
  }
  .sound-control.open{
    padding-left:14px;
  }

  #muteBtn{
    flex:none;
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:transparent;
    color:var(--cream);
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    transition:transform .3s ease;
  }
  #muteBtn:active{ transform:scale(0.92); }

  #volumeSlider{
    -webkit-appearance:none;
    appearance:none;
    width:0;
    opacity:0;
    height:3px;
    margin:0;
    background:rgba(154,140,120,0.35);
    border-radius:999px;
    outline:none;
    transition:width .35s ease, opacity .25s ease, margin .35s ease;
    pointer-events:none;
  }
  .sound-control.open #volumeSlider{
    width:88px;
    opacity:1;
    margin-right:14px;
    pointer-events:auto;
  }
  #volumeSlider::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:13px;
    height:13px;
    border-radius:50%;
    background:var(--rose-bright);
    box-shadow:0 0 6px rgba(232,65,44,0.7);
    cursor:pointer;
    margin-top:-5px;
  }
  #volumeSlider::-webkit-slider-runnable-track{
    height:3px;
    border-radius:999px;
    background:rgba(154,140,120,0.35);
  }
  #volumeSlider::-moz-range-thumb{
    width:13px;
    height:13px;
    border:none;
    border-radius:50%;
    background:var(--rose-bright);
    box-shadow:0 0 6px rgba(232,65,44,0.7);
    cursor:pointer;
  }
  #volumeSlider::-moz-range-track{
    height:3px;
    border-radius:999px;
    background:rgba(154,140,120,0.35);
  }

  /* ---- Reveal screen ---- */
  .reveal{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 12%;
    opacity:0;
    pointer-events:none;
    transition:opacity .7s ease;
  }
  .reveal.show{
    opacity:1;
    pointer-events:auto;
  }
  .reveal .heart{
    font-size:48px;
    animation:pulse 1.4s ease-in-out infinite;
    filter:drop-shadow(0 0 22px rgba(232,65,44,0.6));
    margin-bottom:18px;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.15); }
  }
  .reveal p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size:11vw;
    line-height:1.15;
    color:var(--cream);
    margin:0;
  }
  .reveal p span{
    color:var(--rose-bright);
    font-style:normal;
  }

  .main-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    transition:opacity .5s ease;
  }
  .main-content.fade-out{
    opacity:0;
    pointer-events:none;
  }

  @media (min-width:430px){
    .question{ font-size:34px; }
    .reveal p{ font-size:38px; }
  }
</style>
</head>
<body>

<div class="stage">

  <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
  <div class="sound-control" id="soundControl">
    <button id="muteBtn" aria-label="głośność muzyki">🔊</button>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.25" aria-label="poziom głośności">
  </div>

  <div class="embers" id="embers"></div>

  <div class="main-content" id="mainContent">
    <div class="rose-wrap">
      <span class="rose-emoji">🌹</span>
    </div>

    <div class="eyebrow">jedno pytanie</div>
    <h1 class="question">a pokażesz mi tam gdzie <b>słońce tobie nie dochodzi?</b></h1>
    <p class="sub">odpowiedz szczerze...</p>

    <div class="answer-zone">
      <div class="buttons">
        <button id="tak" onclick="sayYes()">TAK</button>
        <button id="nie" onclick="sayNo()">NIE</button>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <div class="reveal" id="reveal">
    <div class="heart">❤️</div>
    <p>czekam<span>...</span></p>
  </div>

</div>

<script>
  // ---- Background music ----
  const bgMusic = document.getElementById('bgMusic');
  const muteBtn = document.getElementById('muteBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const soundControl = document.getElementById('soundControl');

  const DEFAULT_VOLUME = 0.25;
  bgMusic.volume = DEFAULT_VOLUME;
  volumeSlider.value = DEFAULT_VOLUME;

  let musicStarted = false;

  function updateMuteIcon(){
    if(bgMusic.muted || bgMusic.volume === 0){
      muteBtn.textContent = '🔇';
    } else if(bgMusic.volume < 0.5){
      muteBtn.textContent = '🔉';
    } else {
      muteBtn.textContent = '🔊';
    }
  }

  function startMusic(){
    if(musicStarted) return;
    bgMusic.play().then(() => {
      musicStarted = true;
    }).catch(() => {
      // autoplay blocked, will retry on next interaction
    });
  }

  // try immediately (works on some desktop browsers)
  startMusic();

  // most mobile browsers require a user gesture: unlock on first tap anywhere
  ['touchstart','click'].forEach(evt => {
    document.addEventListener(evt, function unlock(){
      startMusic();
      document.removeEventListener(evt, unlock);
    }, { once:true, passive:true });
  });

  // tapping the speaker icon opens/closes the volume slider
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    soundControl.classList.toggle('open');
  });

  // dragging the slider sets the volume live
  volumeSlider.addEventListener('input', () => {
    const v = parseFloat(volumeSlider.value);
    bgMusic.volume = v;
    bgMusic.muted = false;
    startMusic();
    updateMuteIcon();
  });

  // close the panel when tapping elsewhere on the page
  document.addEventListener('click', (e) => {
    if(!soundControl.contains(e.target)){
      soundControl.classList.remove('open');
    }
  });

  updateMuteIcon();

  let noClicks = 0;
  const niePhrases = [
    'na pewno?',
    'na pewno na pewno?',
    'wiem że chcesz kliknąć TAK',
    'jeszcze tylko jedna szansa...',
    'no dobra, ostatnia...'
  ];

  function sayNo(){
    const nieBtn = document.getElementById('nie');
    const takBtn = document.getElementById('tak');
    const stage = document.querySelector('.stage');

    noClicks++;

    if(noClicks > niePhrases.length){
      nieBtn.classList.add('hidden');
      return;
    }

    nieBtn.textContent = niePhrases[noClicks - 1];

    // switch to fixed positioning so it can roam anywhere on screen
    nieBtn.classList.add('roaming');

    const rect = stage.getBoundingClientRect();
    const btnRect = nieBtn.getBoundingClientRect();
    const margin = 16;
    const maxLeft = rect.width - btnRect.width - margin;
    const maxTop = rect.height - btnRect.height - margin;

    const randLeft = rect.left + margin + Math.random() * Math.max(0, maxLeft - margin);
    const randTop = rect.top + margin + Math.random() * Math.max(0, maxTop - margin);

    nieBtn.style.left = randLeft + 'px';
    nieBtn.style.top = randTop + 'px';

    const nieScale = Math.max(0.4, 1 - noClicks * 0.14);
    const takScale = 1 + noClicks * 0.22;

    nieBtn.style.transform = `scale(${nieScale})`;
    takBtn.style.transform = `scale(${takScale})`;

    if(noClicks >= niePhrases.length){
      setTimeout(() => nieBtn.classList.add('hidden'), 550);
    }
  }

  function sayYes(){
    document.getElementById('mainContent').classList.add('fade-out');
    document.getElementById('reveal').classList.add('show');
  }

  // gentle floating embers
  const emberLayer = document.getElementById('embers');
  for(let i=0;i<14;i++){
    const e = document.createElement('span');
    e.style.left = (Math.random()*100) + '%';
    e.style.setProperty('--drift', (Math.random()*40-20) + 'px');
    e.style.animationDelay = (Math.random()*9) + 's';
    e.style.animationDuration = (7 + Math.random()*5) + 's';
    emberLayer.appendChild(e);
  }
</script>

</body>
</html>
